<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Ecommerce</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Mini Ecommerce</h1>
    <p>Catálogo de produtos em cards usando JavaScript e DOM</p>
  </header>

  <section class="controls">
    <input id="search" type="text" placeholder="Buscar produto...">

    <select id="category">
      <option value="Todas">Todas</option>
    </select>

    <button id="btnRender">Renderizar</button>
  </section>

  <main>
    <div id="product-list"></div>
    <div id="product-details">
      <h2>Detalhes do produto</h2>
      <p>Clique em “Ver detalhes” para visualizar as informações.</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
